name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, unit, changeset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Unit tests
        run: bun run test
      - name: Require a changeset
        # Fails if the PR changes the package without declaring a version bump.
        # No release needed? add an empty one: `bun run changeset -- --empty`.
        # Skipped for the bot's "Version Packages" PR, which consumes changesets.
        if: github.head_ref != 'changeset-release/main'
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          bunx changeset status --since=origin/${{ github.base_ref }}

  e2e:
    name: Playwright e2e (darwin-arm64)
    # Visual snapshots are committed from macOS/arm64 — match that here so
    # font rendering lines up. This is also the only released platform.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Install Playwright browser
        run: bunx playwright install chromium
      - name: Run e2e
        run: bun run test:e2e
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
